<script>
  let email = '', phone = '', code = '', sessionId = '', step = 'request'
  let loading = false, error = ''

  const _api = () => document.querySelector('meta[name="hermes-api-url"]')?.content || ''

  async function requestCode() {
    if (!email || !phone) { error = 'Email and phone are required.'; return }
    loading = true; error = ''
    try {
      const res = await fetch(`${_api()}/auth/request`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email, phone }),
      })
      const data = await res.json()
      if (!res.ok) { error = data.error || 'Unable to send code.'; return }
      sessionId = data.sessionId
      step = 'confirm'
    } catch { error = 'Network error. Check your connection.' }
    finally { loading = false }
  }

  async function confirmCode() {
    if (!code || code.length !== 6) { error = 'Enter the 6-digit code.'; return }
    loading = true; error = ''
    try {
      const res = await fetch(`${_api()}/auth/confirm`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ sessionId, code }),
      })
      const data = await res.json()
      if (!res.ok) { error = data.error || 'Invalid code.'; return }
      window.dispatchEvent(new CustomEvent('hermes:login', { detail: data }))
    } catch { error = 'Network error. Check your connection.' }
    finally { loading = false }
  }
</script>

<div class="login-card">
  <div class="login-logo">HERMES</div>

  <logic :if="step === 'request'">
    <p class="login-title">Sign in</p>
    <p class="login-subtitle">Enter your email and phone number to receive a verification code.</p>

    <div class="form-group">
      <label class="form-label">Email</label>
      <input type="email" :value="email" placeholder="you@example.com" autocomplete="email" />
    </div>
    <div class="form-group">
      <label class="form-label">Phone</label>
      <input type="tel" :value="phone" placeholder="+1 416 555 0100" autocomplete="tel" />
    </div>

    <logic :if="error"><p class="login-error">{error}</p></logic>
    <button class="btn-primary" :disabled="loading" @click="requestCode()">
      {loading ? 'Sending…' : 'Send code'}
    </button>
  </logic>

  <logic :if="step === 'confirm'">
    <p class="login-title">Enter your code</p>
    <p class="login-subtitle">We sent a 6-digit code to your phone.</p>

    <div class="form-group">
      <label class="form-label">Verification code</label>
      <input type="text" :value="code" inputmode="numeric" maxlength="6" placeholder="000000" autocomplete="one-time-code" />
    </div>

    <logic :if="error"><p class="login-error">{error}</p></logic>
    <button class="btn-primary" :disabled="loading" @click="confirmCode()">
      {loading ? 'Verifying…' : 'Verify'}
    </button>
    <button class="btn-ghost" @click="step = 'request'; error = ''" style="display:block;margin-top:0.75rem;width:100%;text-align:center;">← Back</button>
  </logic>
</div>
