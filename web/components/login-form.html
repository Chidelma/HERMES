<div class="login-card">
  <div class="login-logo">HERMES</div>

  <!-- Step 1: email + phone -->
  <div id="login-step-1">
    <p class="login-title">Sign in</p>
    <p class="login-subtitle">Enter your email and phone number to receive a verification code.</p>

    <div class="form-group">
      <label class="form-label" for="login-email">Email</label>
      <input id="login-email" type="email" placeholder="you@example.com" autocomplete="email" />
    </div>

    <div class="form-group">
      <label class="form-label" for="login-phone">Phone</label>
      <input id="login-phone" type="tel" placeholder="+1 416 555 0100" autocomplete="tel" />
    </div>

    <p class="login-error" id="login-error-1"></p>
    <button class="btn-primary" id="btn-request-otp">Send code</button>
  </div>

  <!-- Step 2: OTP -->
  <div id="login-step-2" hidden>
    <p class="login-title">Enter your code</p>
    <p class="login-subtitle otp-hint" id="otp-hint">We sent a 6-digit code to your phone.</p>

    <div class="form-group">
      <label class="form-label" for="login-otp">Verification code</label>
      <input id="login-otp" type="text" inputmode="numeric" maxlength="6" placeholder="000000" autocomplete="one-time-code" />
    </div>

    <p class="login-error" id="login-error-2"></p>
    <button class="btn-primary" id="btn-confirm-otp">Verify</button>
    <button class="btn-ghost" id="btn-back-to-step1" style="display:block;margin-top:0.75rem;width:100%;text-align:center;">← Back</button>
  </div>
</div>
