<div class="compose-panel">
  <p class="compose-title">New message</p>

  <div class="compose-field">
    <span class="compose-label">From</span>
    <input id="compose-from" type="email" placeholder="you@yourdomain.com" />
  </div>

  <div class="compose-field">
    <span class="compose-label">To</span>
    <input id="compose-to" type="email" placeholder="recipient@example.com" />
  </div>

  <div class="compose-field">
    <span class="compose-label">CC</span>
    <input id="compose-cc" type="email" placeholder="optional" />
  </div>

  <div class="compose-field">
    <span class="compose-label">Subj</span>
    <input id="compose-subject" type="text" placeholder="Subject" />
  </div>

  <div class="compose-body">
    <textarea id="compose-body" placeholder="Write your message…"></textarea>
  </div>

  <div class="compose-actions">
    <button class="btn-primary" id="btn-send" style="width:auto;padding:9px 24px;">Send</button>
    <button class="btn-secondary" id="btn-discard">Discard</button>
  </div>
</div>
