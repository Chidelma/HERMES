<div class="inbox-toolbar">
  <button class="btn-secondary" id="btn-back-inbox">← Inbox</button>
  <div style="margin-left:auto;display:flex;gap:0.5rem;">
    <button class="btn-secondary" id="btn-reply">Reply</button>
    <button class="btn-danger" id="btn-delete-email">Delete</button>
  </div>
</div>

<div class="email-detail-header">
  <h2 class="email-detail-subject" id="detail-subject"></h2>
  <div class="email-detail-meta">
    <div class="email-detail-avatar" id="detail-avatar"></div>
    <div>
      <div class="email-detail-from" id="detail-from"></div>
      <div class="email-detail-to" id="detail-to"></div>
    </div>
    <span class="email-detail-date" id="detail-date"></span>
  </div>
</div>

<div class="email-detail-body" id="detail-body"></div>
