<script>
  let email = null

  function initials(addr) {
    return (addr.split('@')[0] || '?').slice(0, 2).toUpperCase()
  }

  window.addEventListener('hermes:open-email', (e) => {
    email = e.detail
    window._hermes?.navigate('email')
  })

  async function deleteEmail() {
    if (!email || !confirm('Delete this message?')) return
    const apiFetch = window._hermes?.apiFetch
    if (!apiFetch) return
    const res = await apiFetch(`/inbox/${email.id}`, { method: 'DELETE' })
    if (res?.ok) {
      window._hermes?.toast('Message deleted.')
      window.dispatchEvent(new Event('hermes:refresh-inbox'))
      window._hermes?.navigate('inbox')
      email = null
    } else {
      window._hermes?.toast('Delete failed.')
    }
  }

  function reply() {
    if (!email) return
    window.dispatchEvent(new CustomEvent('hermes:compose', {
      detail: { to: email.sender, subject: `Re: ${email.subject}` },
    }))
  }
</script>

<div class="inbox-toolbar">
  <button class="btn-secondary" @click="window._hermes?.navigate('inbox')">← Inbox</button>
  <div style="margin-left:auto;display:flex;gap:0.5rem;">
    <button class="btn-secondary" @click="reply()">Reply</button>
    <button class="btn-danger" @click="deleteEmail()">Delete</button>
  </div>
</div>

<logic :if="email">
  <div class="email-detail-header">
    <h2 class="email-detail-subject">{email.subject}</h2>
    <div class="email-detail-meta">
      <div class="email-detail-avatar">{initials(email.sender)}</div>
      <div>
        <div class="email-detail-from">{email.sender}</div>
        <div class="email-detail-to">To: {email.recipient}</div>
      </div>
      <span class="email-detail-date">{new Date(email.receivedAt).toLocaleString()}</span>
    </div>
  </div>
  <div class="email-detail-body">{email.body || '(No body)'}</div>
</logic>
