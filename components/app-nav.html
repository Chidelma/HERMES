<script>
  function activeView() {
    const path = isBrowser ? location.pathname : '/inbox'
    if (path.startsWith('/compose')) return 'compose'
    if (path.startsWith('/settings')) return 'settings'
    return 'inbox'
  }

  function navClass(view) {
    return 'nav-item' + (activeView() === view ? ' active' : '')
  }

  onMount(() => {
    if (window._hermesNavInitialised) return
    window._hermesNavInitialised = true
    window.addEventListener('tachyon:navigate', () => {
      const current = activeView()
      document.querySelectorAll('[data-nav-view]').forEach((item) => {
        item.classList.toggle('active', item.dataset.navView === current)
      })
    })
  })
</script>

<a role="button" data-nav-view="inbox" :class="navClass('inbox')" href="/inbox">
  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
