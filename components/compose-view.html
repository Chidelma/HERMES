<script>
  const routePrefill = isBrowser ? window._hermes?.consumeComposePrefill?.() || {} : {}
  const prefill = (props || {}).prefill || routePrefill
  let to = prefill.to || ''
  let cc = ''
  let subject = prefill.subject || ''
  let text = ''
  let loading = false, error = ''

  async function send() {
    if (!to || !subject) { error = 'To and Subject are required.'; return }
    loading = true; error = ''
    const apiFetch = window._hermes?.apiFetch
    if (!apiFetch) { loading = false; return }
    try {
      const res = await apiFetch('/send', {
        method: 'POST',
        body: JSON.stringify({ to: [to], cc: cc ? [cc] : [], subject, text }),
      })
      if (res?.ok) {
        window._hermes?.toast('Message sent.')
        to = cc = subject = text = ''
        window._hermes?.navigate('inbox')
      } else {
        const data = await res.json()
        error = data.error || 'Send failed.'
      }
    } catch { error = 'Network error.' }
    finally { loading = false }
  }
</script>

<div class="compose-panel">
  <p class="compose-title">New message</p>

  <div class="compose-field">
    <span class="compose-label">To</span>
    <input type="email" :value="to" placeholder="recipient@example.com" />
  </div>

  <div class="compose-field">
    <span class="compose-label">CC</span>
    <input type="email" :value="cc" placeholder="optional" />
  </div>

  <div class="compose-field">
    <span class="compose-label">Subj</span>
    <input type="text" :value="subject" placeholder="Subject" />
  </div>

  <div class="compose-body">
    <textarea :value="text" placeholder="Write your message…"></textarea>
  </div>

  <logic :if="error">
    <p class="login-error" style="margin:0 0 0.5rem;">{error}</p>
  </logic>

  <div class="compose-actions">
    <button class="btn-primary" :disabled="loading" @click="send()" style="width:auto;padding:9px 24px;">
      {loading ? 'Sending…' : 'Send'}
    </button>
    <button class="btn-secondary" @click="window._hermes?.navigate('inbox')">Discard</button>
  </div>
</div>
