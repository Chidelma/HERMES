<script>
  let allEmails = [], loading = true, selectedFolder = 'inbox', search = '', statusFilter = 'all'
  let folder, email

  function folders() {
    const fs = new Set(allEmails.map(e => e.folder || 'inbox'))
    return ['inbox', 'archive', 'trash', ...Array.from(fs).filter(f => !['inbox', 'archive', 'trash'].includes(f)).sort()]
  }

  function emails() {
    return allEmails.filter(e => (e.folder || 'inbox') === selectedFolder)
  }

  function unreadCount() {
    return allEmails.filter(e => !e.read && (e.folder || 'inbox') !== 'trash').length
  }

  function folderCount(name) {
    return allEmails.filter(e => (e.folder || 'inbox') === name).length
  }

  async function load() {
    loading = true
    const apiFetch = window._hermes?.apiFetch
    if (!apiFetch) { loading = false; return }
    const params = new URLSearchParams()
    if (search.trim()) params.set('q', search.trim())
    if (statusFilter === 'unread') params.set('read', 'false')
    if (statusFilter === 'starred') params.set('starred', 'true')
    const suffix = params.toString() ? `?${params.toString()}` : ''
    const res = await apiFetch(`/inbox${suffix}`)
    allEmails = res?.ok ? await res.json() : []
    loading = false
  }

  async function updateEmail(email, patch) {
    const apiFetch = window._hermes?.apiFetch
    if (!apiFetch) return email
    const res = await apiFetch(`/inbox/${email.id}`, {
      method: 'PUT',
      body: JSON.stringify(patch),
    })
    if (!res?.ok) return email
    const updated = await res.json()
    allEmails = allEmails.map(item => item.id === updated.id ? updated : item)
    return updated
  }

  async function clearSearch() {
    search = ''
    statusFilter = 'all'
    await load()
  }

  await load()

  onMount(() => {
    window.removeEventListener('hermes:refresh-inbox', window._hermesInboxRefresh)
    window._hermesInboxRefresh = load
    window.addEventListener('hermes:refresh-inbox', load)
  })
</script>

<div class="inbox-toolbar">
  <span class="inbox-title">Inbox</span>
  <span class="inbox-count">{unreadCount()} unread</span>
  <button class="btn-secondary" style="margin-left:auto;" @click="load()">Refresh</button>
</div>

<div class="inbox-search">
  <input
    class="search-input"
    type="search"
    :value="search"
    aria-label="Search mail"
    placeholder="Search from, to, subject, body, filename:invoice, has:attachment" />
  <button class="btn-primary" @click="load()">Search</button>
  <button class="btn-secondary" @click="clearSearch()">Clear</button>
</div>

<div class="filter-strip">
  <button
    :class="'btn-' + (statusFilter === 'all' ? 'primary' : 'secondary')"
    @click="statusFilter = 'all'; load()">
    All
  </button>
  <button
    :class="'btn-' + (statusFilter === 'unread' ? 'primary' : 'secondary')"
    @click="statusFilter = 'unread'; load()">
    Unread
  </button>
  <button
    :class="'btn-' + (statusFilter === 'starred' ? 'primary' : 'secondary')"
    @click="statusFilter = 'starred'; load()">
    Starred
  </button>
</div>

<div class="folder-tabs">
  <loop :for="folder of folders()">
    <button
      :class="'btn-' + (selectedFolder === folder ? 'primary' : 'secondary')"
      @click="selectedFolder = folder">
      {folder} <span>{folderCount(folder)}</span>
    </button>
  </loop>
</div>

<div class="inbox-list">
  <logic :if="loading">
    <div class="inbox-empty"><div class="spinner"></div><span>Loading…</span></div>
  </logic>

  <logic :if="!loading && emails().length === 0">
    <div class="inbox-empty">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
        <path d="M22 12h-6l-2 3h-4l-2-3H2"/>
        <path d="M5.45 5.11L2 12v6a2 2 0 002 2h16a2 2 0 002-2v-6l-3.45-6.89A2 2 0 0016.76 4H7.24a2 2 0 00-1.79 1.11z"/>
      </svg>
      <span>{search ? 'No matching mail in ' + selectedFolder : 'No emails in ' + selectedFolder}</span>
    </div>
  </logic>

  <loop :for="email of emails()">
    <a
      :class="'email-row ' + (!email.read ? 'unread' : 'read')"
      :data-email-id="email.id"
      :href="'/email/' + encodeURIComponent(email.id)">
      <div class="email-avatar">{window._hermes.initials(email.sender)}</div>
      <div class="email-meta">
        <div class="email-sender">{email.starred ? '★ ' : ''}{email.sender}</div>
        <div class="email-subject">{email.subject}</div>
      </div>
      <span class="email-time">{window._hermes.formatDate(email.receivedAt)}</span>
    </a>
  </loop>
</div>
