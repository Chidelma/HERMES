name: Release

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  test:
    name: Unit / DB / API tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install --frozen-lockfile
      - run: bun run test

  e2e:
    name: Playwright E2E tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install --frozen-lockfile
      - run: bun node_modules/.bin/playwright install --with-deps
      - run: bun run test:e2e
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: |
            playwright-report/
            test-results/
          retention-days: 7

  image-blackbox:
    name: Image blackbox tests
    runs-on: ubuntu-latest
    env:
      HERMES_IMAGE: hermes:blackbox
      HERMES_URL: http://127.0.0.1:18080
      INBOUND_WEBHOOK_SECRET: blackbox-webhook-secret
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install --frozen-lockfile

      - name: Require private blackbox credentials
        env:
          BLACKBOX_REPOSITORY: ${{ vars.HERMES_BLACKBOX_REPOSITORY || secrets.HERMES_BLACKBOX_REPOSITORY }}
          BLACKBOX_TOKEN: ${{ secrets.HERMES_BLACKBOX_TOKEN }}
        run: |
          if [ -z "$BLACKBOX_REPOSITORY" ]; then
            echo "::error::Missing HERMES_BLACKBOX_REPOSITORY variable or secret"
            exit 1
          fi
          if [ -z "$BLACKBOX_TOKEN" ]; then
            echo "::error::Missing HERMES_BLACKBOX_TOKEN secret"
            exit 1
          fi

      - name: Checkout private blackbox suite
        uses: actions/checkout@v4
        with:
          repository: ${{ vars.HERMES_BLACKBOX_REPOSITORY || secrets.HERMES_BLACKBOX_REPOSITORY }}
          token: ${{ secrets.HERMES_BLACKBOX_TOKEN }}
          ref: ${{ vars.HERMES_BLACKBOX_REF || 'main' }}
          path: .blackbox-tests

      - uses: docker/setup-buildx-action@v3
      - name: Build image under test
        uses: docker/build-push-action@v6
        with:
          context: .
          tags: ${{ env.HERMES_IMAGE }}
          load: true
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Start container
        run: |
          docker run -d --name hermes-blackbox \
            -p 18080:8080 \
            -e JWT_SECRET=blackbox-jwt-secret \
            -e INBOUND_WEBHOOK_SECRET=${{ env.INBOUND_WEBHOOK_SECRET }} \
            -e WEB_PUSH_DISABLED=true \
            "${{ env.HERMES_IMAGE }}"

      - name: Wait for container to become healthy
        run: |
          for i in $(seq 1 60); do
            if curl -fsS "${{ env.HERMES_URL }}/" >/dev/null 2>&1; then
              echo "Container is responding on attempt $i"
              exit 0
            fi
            sleep 1
          done
          echo "Container did not become healthy in time"
          docker logs hermes-blackbox
          exit 1

      - name: Run blackbox tests
        working-directory: .blackbox-tests
        env:
          HERMES_IMAGE: ${{ env.HERMES_IMAGE }}
          HERMES_URL: ${{ env.HERMES_URL }}
          INBOUND_WEBHOOK_SECRET: ${{ env.INBOUND_WEBHOOK_SECRET }}
        run: |
          if [ -f package.json ] || [ -f bun.lock ]; then
            bun install --frozen-lockfile
          fi

          if [ -f package.json ] && jq -e '.scripts.blackbox' package.json >/dev/null; then
            bun run blackbox
          else
            bun test . --timeout 120000
          fi

      - name: Container logs on failure
        if: failure()
        run: docker logs hermes-blackbox || true

      - name: Stop container
        if: always()
        run: docker rm -f hermes-blackbox || true

  version:
    name: Read version
    needs: [test, e2e, image-blackbox]
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.read.outputs.version }}
      tag_exists: ${{ steps.check.outputs.exists }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - id: read
        run: |
          v=$(jq -r .version package.json)
          echo "version=$v" >> "$GITHUB_OUTPUT"
          echo "Version: $v"
      - id: check
        env:
          TAG: v${{ steps.read.outputs.version }}
        run: |
          if git rev-parse "refs/tags/$TAG" >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "Tag $TAG already exists — skipping publish and release."
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

  publish:
    name: Build and push to Docker Hub
    needs: version
    if: needs.version.outputs.tag_exists == 'false'
    runs-on: ubuntu-latest
    env:
      VERSION: ${{ needs.version.outputs.version }}
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.DOCKERHUB_USERNAME }}/hermes
          tags: |
            type=raw,value=${{ env.VERSION }}
            type=raw,value=latest
      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          platforms: linux/amd64,linux/arm64
          cache-from: type=gha
          cache-to: type=gha,mode=max

  github-release:
    name: Create git tag and GitHub Release
    needs: [version, publish]
    if: needs.version.outputs.tag_exists == 'false'
    runs-on: ubuntu-latest
    env:
      VERSION: ${{ needs.version.outputs.version }}
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Create tag
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -a "v$VERSION" -m "Release v$VERSION"
          git push origin "v$VERSION"
      - name: Create GitHub Release
        run: |
          gh release create "v$VERSION" \
            --title "v$VERSION" \
            --generate-notes
