name: CI

on:
  push:
    branches: ['release/**']
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Unit / DB / API tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install --frozen-lockfile
      - run: bun run test

  e2e:
    name: Playwright E2E tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install --frozen-lockfile
      - run: bun node_modules/.bin/playwright install --with-deps
      - run: bun run test:e2e
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: |
            playwright-report/
            test-results/
          retention-days: 7

  open-release-pr:
    name: Open release PR
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/heads/release/')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Create PR if one doesn't exist
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          BRANCH: ${{ github.ref_name }}
        run: |
          existing=$(gh pr list --head "$BRANCH" --base main --state open --json number --jq '.[0].number // empty')
          if [ -n "$existing" ]; then
            echo "PR #$existing already open for $BRANCH"
            exit 0
          fi
          version="${BRANCH#release/}"
          gh pr create \
            --base main \
            --head "$BRANCH" \
            --title "Release $version" \
            --body "Automated release PR for \`$BRANCH\`.

          Merging this PR will:
          - Build and push the Docker image to Docker Hub
          - Tag the commit as \`v$version\`
          - Publish a GitHub Release with generated notes

          Make sure \`package.json\` version matches \`$version\` before merging."
