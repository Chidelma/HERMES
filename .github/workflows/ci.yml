name: CI

on:
  push:
    branches: ['release/**']
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Unit / DB / API tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install --frozen-lockfile
      - run: bun run test

  e2e:
    name: Playwright E2E tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install --frozen-lockfile
      - run: bun node_modules/.bin/playwright install --with-deps
      - run: bun run test:e2e
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: |
            playwright-report/
            test-results/
          retention-days: 7

  image-blackbox:
    name: Image blackbox tests
    runs-on: ubuntu-latest
    env:
      HERMES_IMAGE: hermes:blackbox
      HERMES_URL: http://127.0.0.1:18080
      INBOUND_WEBHOOK_SECRET: blackbox-webhook-secret
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install --frozen-lockfile

      - uses: docker/setup-buildx-action@v3
      - name: Build image under test
        uses: docker/build-push-action@v6
        with:
          context: .
          tags: ${{ env.HERMES_IMAGE }}
          load: true
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Start container
        run: |
          docker run -d --name hermes-blackbox \
            -p 18080:8080 \
            -e JWT_SECRET=blackbox-jwt-secret \
            -e INBOUND_WEBHOOK_SECRET=${{ env.INBOUND_WEBHOOK_SECRET }} \
            -e WEB_PUSH_DISABLED=true \
            "${{ env.HERMES_IMAGE }}"

      - name: Wait for container to become healthy
        run: |
          for i in $(seq 1 60); do
            if curl -fsS "${{ env.HERMES_URL }}/" >/dev/null 2>&1; then
              echo "Container is responding on attempt $i"
              exit 0
            fi
            sleep 1
          done
          echo "Container did not become healthy in time"
          docker logs hermes-blackbox
          exit 1

      - name: Run blackbox tests
        run: bun run test:blackbox

      - name: Container logs on failure
        if: failure()
        run: docker logs hermes-blackbox

      - name: Stop container
        if: always()
        run: docker rm -f hermes-blackbox || true

  open-release-pr:
    name: Open release PR
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/heads/release/')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Create PR if one doesn't exist
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          BRANCH: ${{ github.ref_name }}
        run: |
          existing=$(gh pr list --head "$BRANCH" --base main --state open --json number --jq '.[0].number // empty')
          if [ -n "$existing" ]; then
            echo "PR #$existing already open for $BRANCH"
            exit 0
          fi
          version="${BRANCH#release/}"
          gh pr create \
            --base main \
            --head "$BRANCH" \
            --title "Release $version" \
            --body "Automated release PR for \`$BRANCH\`.

          Merging this PR will:
          - Build and push the Docker image to Docker Hub
          - Tag the commit as \`v$version\`
          - Publish a GitHub Release with generated notes

          Make sure \`package.json\` version matches \`$version\` before merging."
