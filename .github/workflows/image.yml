name: Build and Deploy Image

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

concurrency:
  group: image-deploy-prod
  cancel-in-progress: false

env:
  AWS_REGION: ca-central-1
  ECR_REPOSITORY: hermes
  ECS_CLUSTER: hermes
  ECS_SERVICE: hermes

jobs:
  test:
    name: Unit tests (gate)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun test tests/unit.test.js

  build-and-deploy:
    name: Build image and deploy
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::117469679339:role/caduceus-hermes-deploy
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to ECR
        id: ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push image
        env:
          REGISTRY: ${{ steps.ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build \
            --tag "$REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG" \
            --tag "$REGISTRY/$ECR_REPOSITORY:latest" \
            .
          docker push "$REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG"
          docker push "$REGISTRY/$ECR_REPOSITORY:latest"

      - name: Force new ECS deployment
        run: |
          aws ecs update-service \
            --cluster "$ECS_CLUSTER" \
            --service "$ECS_SERVICE" \
            --force-new-deployment \
            --query "service.deployments[0].status" \
            --output text
