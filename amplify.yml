version: 1
applications:
  - appRoot: web
    frontend:
      phases:
        preBuild:
          commands:
            - curl -fsSL https://bun.sh/install | bash
            - export PATH="$HOME/.bun/bin:$PATH"
            - bun install --no-cache
            - mkdir -p assets
            - printf 'window.HERMES_CONFIG={apiUrl:"%s"};\n' "${HERMES_API_URL}" > assets/config.js
        build:
          commands:
            - export PATH="$HOME/.bun/bin:$PATH"
            - bun run bundle
      artifacts:
        baseDirectory: dist
        files:
          - '**/*'
      cache:
        paths: []
